name: Claude Code Review

on:
  pull_request:
    # Auto-review once when a PR is ready for human review, never on a push.
    # `synchronize` (fires on each new commit) is omitted so a follow-up push
    # doesn't re-run a full review; request one on demand by commenting
    # `@claude` (handled by claude.yml). `ready_for_review` covers the
    # draft → ready transition; `opened` covers a PR opened directly as ready.
    # The job's `if` skips drafts, so the two never double-review.
    types: [opened, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Never auto-review a draft PR; `ready_for_review` triggers the run once it
    # leaves draft. (Also gates the `opened` event for PRs opened as drafts.)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          track_progress: 'true'
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --model claude-opus-4-8
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            Use Skill /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Review this PR against our team checklist:

            ## Code Quality
            - [ ] Code follows our style guide detailed in the CLAUDE.md
            - [ ] Meaningful variable names
            - [ ] DRY principle followed
            - [ ] No cross-silo code; no game logic in the UI, no UI code in the game engine
            - [ ] Game engine is pure
            - [ ] No tech debt is introduced
            - [ ] No unnecessary React hooks such as `useCallback` or `useMemo`. The React Compiler is enabled, making most of those unnecessary
            - [ ] Code should use shadcn/ui primitives whereever possible. Flag code that should be a shadcn primitive unless it has a justifying JSDoc

            ## Testing
            - [ ] Unit tests for new functions
            - [ ] e2e tests for new UI
            - [ ] Edge cases covered

            ## Security
            - [ ] No hardcoded credentials
            - [ ] Input validation implemented
            - [ ] Proper error handling
            - [ ] No sensitive data in logs

            For each item, check if it's satisfied and comment on any that need attention.
            Post a summary comment with checklist results.
            
            Do not attempt external MCP or API calls (except to GitHub), such as to Neon or Vercel, to verify deployment or database details. You also do not need to install dependencies, run tests, or lint.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

