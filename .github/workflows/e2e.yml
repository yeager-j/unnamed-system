name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      # The sheet routes are DB-backed, so e2e needs a real, seeded database.
      # An ephemeral Neon branch per run is created here and deleted in the
      # always() teardown below so it can never accumulate against the branch
      # cap.
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci-e2e/${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Expose DATABASE_URL
        run: echo "DATABASE_URL=${{ steps.neon.outputs.db_url }}" >> "$GITHUB_ENV"

      - name: Apply migrations
        working-directory: apps/web
        run: npm run db:migrate

      - name: Seed database
        working-directory: apps/web
        run: npm run db:seed

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ci-e2e/${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
