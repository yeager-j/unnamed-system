name: E2E

# The full Playwright suite, run against a production build served on the
# runner itself (`next start`) — zero Vercel edge requests. Deployment-specific
# coverage (env wiring, auth on the deployed domain, Blob) lives in the @smoke
# subset, which smoke.yml runs against the actual preview deployment.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The local server never performs a real OAuth round-trip (sessions are
      # minted directly in the DB by e2e/auth.setup.ts), but lib/auth/env.ts
      # requires these to be present.
      AUTH_SECRET: e2e-local-only-not-a-secret
      GOOGLE_CLIENT_ID: e2e-local-dummy
      GOOGLE_CLIENT_SECRET: e2e-local-dummy
      # Match the preview environment the suite was written against.
      NEXT_PUBLIC_INCLUDE_DEMO_ARCHETYPES: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check dependency boundaries
        run: npm run depcheck

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      # Copy-on-write branch off the project's default branch; created in
      # seconds, deleted in the always() step below so runs don't accumulate
      # toward the Neon branch cap.
      - name: Create ephemeral Neon branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail
          BRANCH="ci/run-${{ github.run_id }}-${{ github.run_attempt }}"
          npx -y neonctl branches create \
            --project-id "${{ vars.NEON_PROJECT_ID }}" \
            --name "$BRANCH" \
            --api-key "$NEON_API_KEY" > /dev/null
          DB_URL=$(npx -y neonctl connection-string "$BRANCH" \
            --project-id "${{ vars.NEON_PROJECT_ID }}" \
            --api-key "$NEON_API_KEY")
          echo "::add-mask::$DB_URL"
          echo "NEON_CI_BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Apply migrations
        working-directory: apps/web
        run: npm run db:migrate

      - name: Seed database
        working-directory: apps/web
        run: npm run db:seed

      - name: Build
        run: npm run build

      # No BASE_URL → playwright.config.ts starts `next start` on the runner.
      # @smoke specs are excluded here; smoke.yml runs them against the
      # preview deployment.
      - name: Run E2E tests
        working-directory: apps/web
        run: npx playwright test --grep-invert "@smoke"

      # The headcanon real-router negative control (UNN-682): a mutation must
      # canonize in place through the actual App Router — the package's jsdom
      # contract suite cannot observe React's Action scheduling, so this is
      # the only gate that can catch a held-open-Action deadlock. Needs no
      # database; the fixture's authority is in-memory.
      - name: Run headcanon fixture E2E
        working-directory: apps/headcanon-fixture
        run: npx playwright test

      - name: Delete ephemeral Neon branch
        if: always()
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          [ -z "${NEON_CI_BRANCH:-}" ] && exit 0
          npx -y neonctl branches delete "$NEON_CI_BRANCH" \
            --project-id "${{ vars.NEON_PROJECT_ID }}" \
            --api-key "$NEON_API_KEY"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload headcanon fixture report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headcanon-fixture-report
          path: apps/headcanon-fixture/playwright-report/
          retention-days: 7
